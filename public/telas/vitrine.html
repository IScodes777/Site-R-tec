<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/catag.css"> 
    <title>Vitrine da R-tec</title>
</head>
<body>
    <main>
        <div class="espaco"></div>
        <div class="busca-container">
            <input type="text" id="pesquisa" placeholder="Digite o que procura...">
            <button id="botao-buscar">Buscar</button>
        </div>
        <div class="categorias">
            <button class="active">Ver todos</button>
            <button >Acessórios</button>
            <button>Gamer</button>
            <button>Celulares</button>
            <button>Aparelhos de áudio</button>
            <button>Periféricos</button>
        </div>
    </main>

    <h1>Catálogo de Produtos</h1>

    <div class="row" id="container-produtos">   
        <div class="column">
            <p>Carregando catálogo...</p>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="fechar" class="close">&times;</span>
            <div id="modal-fotos-container" style="display: flex; gap: 15px; margin-top: 5px; margin-bottom: 20px; overflow-x: auto; padding: 5px; border: 1px dashed #ccc; min-height: 102px; border-radius: 5px; align-items: center;"></div>
            <h2 id="modal-nome"></h2>
            <p id="modal-descricao"></p>
            <p><strong>Cor:</strong> <span id="modal-cor"></span></p>
            <p><strong>Marca:</strong> <span id="modal-marca"></span></p>
            <p><strong>Tipo:</strong> <span id="modal-tipo"></span></p>
            <p><strong>Preço:</strong> <span id="modal-preco"></span></p>
            <span id="modal-link" class="contato">
                <a id="btn-whatsapp" href="#" target="_blank">
                    Falar com o vendedor <strong>⤴</strong>
                </a>
            </span>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/scripts/app.js"></script>
</body>
</html>
