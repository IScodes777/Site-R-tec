<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/catag.css"> 
    <title>Vitrine da R-tec</title>
</head>
<body>
    <main>
        <h1>Catalogo R-tec</h1>
        <input type="text" id="pesquisa" placeholder="Pesquisar produtos..."> <button id="botao-buscar">🔍</button>
        <div class="categorias">
            <button class="active">Ver todos</button>
            <button >Acessórios</button>
            <button>Gamer</button>
            <button>Celulares</button>
            <button>Aparelhos de áudio</button>
            <button>Periféricos</button>
        </div>
    </main>

    <div class="row" id="container-produtos">   
        <div class="column">
            <p>Carregando catálogo...</p>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="fechar" class="close">&times;</span>
            <img id="modal-foto" src="" alt="" style="width:35%; height:36%;">
            <h2 id="modal-nome"></h2>
            <p id="modal-descricao"></p>
            <p><strong>Cor:</strong> <span id="modal-cor"></span></p>
            <p><strong>Marca:</strong> <span id="modal-marca"></span></p>
            <p><strong>Tipo:</strong> <span id="modal-tipo"></span></p>
            <p><strong>Preço:</strong> <span id="modal-preco"></span></p>
            <span id="modal-link" class="contato"><a onclick="window.location.href='https://wa.me/558994039358?text=Olá%20R-tec%2C%20gostaria%20de%20saber%20mais%20sobre%20os%20produtos.'" target="_blank">Falar com o vendedor <strong>⤴</strong></a></span>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/scripts/app.js"></script>
</body>
</html>
